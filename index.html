<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NUESTRO UNIVERSO ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffb3c6;
            --secondary: #ff809f;
            --accent: #ffd1dc;
            --text-glow: 0 0 15px rgba(255, 179, 198, 0.6), 0 0 30px rgba(255, 128, 159, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #030102; 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            -webkit-font-smoothing: antialiased;
        }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Pantalla de Inicio Elegante */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(30,10,20,0.8) 0%, rgba(0,0,0,1) 100%);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #intro-screen h1 {
            font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: 3.5rem; letter-spacing: 6px; 
            margin-bottom: 2rem; text-align: center; text-shadow: var(--text-glow); color: var(--accent);
            opacity: 0; transform: translateY(20px); animation: fadeIn 3s ease forwards 0.5s;
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        #btn-enter {
            padding: 12px 45px; font-size: 1rem; font-weight: 300; background: transparent; color: var(--accent);
            border: 1px solid rgba(255, 179, 198, 0.4); border-radius: 50px; cursor: pointer; transition: all 0.5s ease; 
            font-family: inherit; letter-spacing: 4px;
            opacity: 0; animation: fadeIn 3s ease forwards 1.5s;
        }

        #btn-enter:hover { background: rgba(255, 179, 198, 0.1); border-color: var(--primary); box-shadow: var(--text-glow); transform: scale(1.05); }

        /* Tarjeta de Mensaje Mejorada con espacio para foto */
        #message-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.95);
            width: 85%; max-width: 500px; padding: 30px; text-align: center;
            background: linear-gradient(135deg, rgba(25, 10, 15, 0.95) 0%, rgba(10, 5, 10, 0.98) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 179, 198, 0.3); border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255, 179, 198, 0.1);
            z-index: 50; opacity: 0; pointer-events: none; transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        #message-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        #card-photo {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 15px; border: 3px solid var(--primary); box-shadow: 0 0 20px rgba(255,179,198,0.5);
            display: block;
        }

        #card-icon { font-size: 2.5rem; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255,179,198,0.8)); }

        #card-title {
            font-family: 'Montserrat', sans-serif; font-size: 1rem; letter-spacing: 3px; 
            color: var(--primary); margin-bottom: 10px; text-transform: uppercase; font-weight: 600;
        }

        #card-text { 
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.4rem; line-height: 1.4; 
            font-weight: 300; margin-bottom: 25px; color: #fff;
        }

        #btn-close {
            background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8);
            padding: 10px 30px; border-radius: 30px; cursor: pointer; font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; letter-spacing: 2px; transition: 0.4s;
        }

        #btn-close:hover { background: rgba(255,255,255,0.05); border-color: #fff; color: #fff; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3);
            z-index: 40; pointer-events: none; transition: 0.3s ease;
        }
        #crosshair.active { background: rgba(255,255,255,1); box-shadow: 0 0 15px var(--primary); transform: translate(-50%, -50%) scale(2); }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; justify-content: center; align-items: center;
            color: var(--primary); font-family: monospace; font-size: 1.2rem;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">✨ CARGANDO NUESTRO UNIVERSO... ✨</div>

    <div id="intro-screen">
        <h1>NUESTRO UNIVERSO</h1>
        <button id="btn-enter">EXPLORAR</button>
    </div>

    <div id="crosshair"></div>

    <div id="message-card">
        <img id="card-photo" src="" alt="foto">
        <div id="card-icon"></div>
        <div id="card-title"></div>
        <p id="card-text"></p>
        <button id="btn-close">CERRAR</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==========================================
        // 📥 CARGAR FRASES DESDE TXT
        // ==========================================
        async function cargarFrases() {
            try {
                const response = await fetch('frases.txt');
                const texto = await response.text();
                const lineas = texto.split('\n').filter(linea => linea.trim() && !linea.startsWith('#'));
                
                return lineas.map((linea, i) => {
                    const partes = linea.split('|');
                    return {
                        id: i,
                        title: partes[0]?.trim() || "Algo especial",
                        message: partes[1]?.trim() || "Eres increíble",
                        emoji: partes[2]?.trim() || "✨",
                        fotoIndex: i % 20 + 1 // Cicla entre foto1.jpg hasta foto20.jpg
                    };
                });
            } catch (error) {
                console.error('Error cargando frases:', error);
                // Frases de respaldo si no carga el archivo
                return Array(30).fill().map((_, i) => ({
                    id: i,
                    title: "Momento especial",
                    message: "Cada momento contigo es único",
                    emoji: "💕",
                    fotoIndex: (i % 20) + 1
                }));
            }
        }

        // ==========================================
        // 🖼️ CREAR ESFERAS CON FOTOS (en lugar de emojis)
        // ==========================================
        function createPhotoSphere(url, emoji, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Fondo circular con gradiente
            const centerX = 256, centerY = 256, radius = 230;
            const gradient = ctx.createRadialGradient(centerX, centerY, radius * 0.3, centerX, centerY, radius);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.6, color + 'aa');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Borde brillante
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius - 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.font = '80px "Apple Color Emoji", "Segoe UI Emoji"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(emoji, centerX, centerY);
            
            // Cargar foto encima si es posible
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, 120, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(img, centerX - 120, centerY - 120, 240, 240);
                ctx.restore();
                texture.needsUpdate = true;
            };
            img.src = url;
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, blending: THREE.AdditiveBlending });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(14, 14, 1);
            return sprite;
        }

        // ==========================================
        // 🚀 INICIALIZAR ESCENA
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030102, 0.002);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 40, 120);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.15;
        controls.maxDistance = 350;
        controls.minDistance = 25;
        
        // Post-procesado
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.6, 0.2);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Agujero negro central
        const blackHoleGeo = new THREE.SphereGeometry(10, 64, 64);
        const blackHoleMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x110000, roughness: 0.1, metalness: 0.9 });
        const blackHole = new THREE.Mesh(blackHoleGeo, blackHoleMat);
        scene.add(blackHole);
        
        // Anillo de luz alrededor del agujero negro
        const ringGeo = new THREE.TorusGeometry(12, 0.8, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff6699, emissive: 0xff3366, emissiveIntensity: 1.5 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        scene.add(ring);
        
        // Partículas de polvo estelar
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 4000;
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const radius = 15 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            dustPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.5;
            dustPositions[i*3+2] = radius * Math.cos(phi);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff99bb, size: 0.15, transparent: true, blending: THREE.AdditiveBlending });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // Estrellas lejanas
        const starGeo = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 800;
            starPositions[i*3+1] = (Math.random() - 0.5) * 400;
            starPositions[i*3+2] = (Math.random() - 0.5) * 500 - 200;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ==========================================
        // 🌟 CREAR ESFERAS FLOTANTES (con fotos)
        // ==========================================
        const spheres = [];
        const colores = ['#ffb3c6', '#ff809f', '#ffd1dc', '#ff99b3', '#ffc0d0'];
        
        async function init() {
            const frasesData = await cargarFrases();
            
            frasesData.forEach((data, index) => {
                const color = colores[index % colores.length];
                const fotoUrl = `fotos/foto${data.fotoIndex}.jpg`;
                
                const sprite = createPhotoSphere(fotoUrl, data.emoji, color);
                
                const angle = (index / frasesData.length) * Math.PI * 2 * 3;
                const distance = 45 + (Math.random() * 70);
                const height = (Math.random() - 0.5) * 50;
                
                sprite.position.set(Math.cos(angle) * distance, height, Math.sin(angle) * distance);
                sprite.userData = {
                    data: data,
                    angle: angle,
                    distance: distance,
                    baseY: height,
                    speed: 0.0008 + Math.random() * 0.001,
                    bobSpeed: 1 + Math.random() * 1.5,
                    originalScale: 14
                };
                
                scene.add(sprite);
                spheres.push(sprite);
            });
            
            // Ocultar loader
            document.getElementById('loader').style.display = 'none';
            
            // Configurar interacciones
            setupInteractions(spheres);
            animate();
        }
        
        // ==========================================
        // 🖱️ INTERACCIONES
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const crosshair = document.getElementById('crosshair');
        const cardModal = document.getElementById('message-card');
        
        function setupInteractions(spheresList) {
            window.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            });
            
            window.addEventListener('click', () => {
                if (cardModal.classList.contains('active')) return;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(spheresList);
                
                if (intersects.length > 0) {
                    const sphere = intersects[0].object;
                    const data = sphere.userData.data;
                    
                    // Efecto de escala
                    sphere.scale.set(20, 20, 1);
                    setTimeout(() => sphere.scale.set(14, 14, 1), 300);
                    
                    // Mostrar tarjeta con foto
                    const fotoUrl = `fotos/foto${data.fotoIndex}.jpg`;
                    document.getElementById('card-photo').src = fotoUrl;
                    document.getElementById('card-icon').innerHTML = data.emoji;
                    document.getElementById('card-title').innerHTML = data.title;
                    document.getElementById('card-text').innerHTML = data.message;
                    cardModal.classList.add('active');
                }
            });
            
            document.getElementById('btn-close').addEventListener('click', () => {
                cardModal.classList.remove('active');
            });
        }
        
        // ==========================================
        // 🎬 ANIMACIÓN
        // ==========================================
        let clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            controls.update();
            
            // Animar anillo del agujero negro
            ring.rotation.x = Math.sin(elapsedTime * 0.5) * 0.3;
            ring.rotation.z = elapsedTime * 0.2;
            ring.rotation.y = elapsedTime * 0.1;
            
            // Animar partículas
            dustParticles.rotation.y = elapsedTime * 0.05;
            stars.rotation.y = elapsedTime * 0.01;
            
            // Animar esferas
            spheres.forEach((sphere) => {
                const ud = sphere.userData;
                if (ud) {
                    ud.angle += ud.speed;
                    sphere.position.x = Math.cos(ud.angle) * ud.distance;
                    sphere.position.z = Math.sin(ud.angle) * ud.distance;
                    sphere.position.y = ud.baseY + Math.sin(elapsedTime * ud.bobSpeed) * 2.5;
                    
                    // Pulsación suave
                    const pulse = ud.originalScale + Math.sin(elapsedTime * 2.5) * 0.8;
                    if (sphere.scale.x < 21) {
                        sphere.scale.set(pulse, pulse, 1);
                    }
                }
            });
            
            // Hover effect
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(spheres);
            if (intersects.length > 0) {
                crosshair.classList.add('active');
                document.body.style.cursor = 'pointer';
            } else {
                crosshair.classList.remove('active');
                document.body.style.cursor = 'default';
            }
            
            composer.render();
        }
        
        // ==========================================
        // 🚪 INTRO Y RESIZE
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('btn-enter').addEventListener('click', () => {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => intro.style.display = 'none', 2500);
            
            // Zoom in suave
            const startZ = camera.position.z;
            const endZ = 120;
            let startTime = null;
            function zoomIn(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min(1, (timestamp - startTime) / 2000);
                camera.position.z = startZ + (endZ - startZ) * progress;
                if (progress < 1) requestAnimationFrame(zoomIn);
            }
            requestAnimationFrame(zoomIn);
        });
        
        init();
    </script>
</body>
</html>
